naftiko: 1.0.0-alpha2
info:
  label: Segment HTTP Tracking API — Screen
  description: 'Segment HTTP Tracking API — Screen. 1 operations. Lead operation: Record a screen view. Self-contained Naftiko
    capability covering one Segment business surface.'
  tags:
  - Segment
  - Screen
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEGMENT_API_KEY: SEGMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-tracking-screen
    baseUri: https://api.segment.io/v1
    description: Segment HTTP Tracking API — Screen business capability. Self-contained, no shared references.
    resources:
    - name: screen
      path: /screen
      operations:
      - name: screen
        method: POST
        description: Record a screen view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.SEGMENT_USER}}'
      password: '{{env.SEGMENT_PASS}}'
  exposes:
  - type: rest
    namespace: http-tracking-screen-rest
    port: 8080
    description: REST adapter for Segment HTTP Tracking API — Screen. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/screen
      name: screen
      description: REST surface for screen.
      operations:
      - method: POST
        name: screen
        description: Record a screen view
        call: http-tracking-screen.screen
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-tracking-screen-mcp
    port: 9090
    transport: http
    description: MCP adapter for Segment HTTP Tracking API — Screen. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: record-screen-view
      description: Record a screen view
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: http-tracking-screen.screen
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
