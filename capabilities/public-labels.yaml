naftiko: 1.0.0-alpha2
info:
  label: Segment Public API — Labels
  description: 'Segment Public API — Labels. 3 operations. Lead operation: List labels. Self-contained Naftiko capability
    covering one Segment business surface.'
  tags:
  - Segment
  - Labels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEGMENT_API_KEY: SEGMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: public-labels
    baseUri: https://api.segmentapis.com
    description: Segment Public API — Labels business capability. Self-contained, no shared references.
    resources:
    - name: labels
      path: /labels
      operations:
      - name: listlabels
        method: GET
        description: List labels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlabel
        method: POST
        description: Create label
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: labels-labelKey-labelValue
      path: /labels/{labelKey}/{labelValue}
      operations:
      - name: deletelabel
        method: DELETE
        description: Delete label
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: labelKey
          in: path
          type: string
          description: The label key.
          required: true
        - name: labelValue
          in: path
          type: string
          description: The label value.
          required: true
    authentication:
      type: bearer
      token: '{{env.SEGMENT_API_KEY}}'
  exposes:
  - type: rest
    namespace: public-labels-rest
    port: 8080
    description: REST adapter for Segment Public API — Labels. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/labels
      name: labels
      description: REST surface for labels.
      operations:
      - method: GET
        name: listlabels
        description: List labels
        call: public-labels.listlabels
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlabel
        description: Create label
        call: public-labels.createlabel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/labels/{labelkey}/{labelvalue}
      name: labels-labelkey-labelvalue
      description: REST surface for labels-labelKey-labelValue.
      operations:
      - method: DELETE
        name: deletelabel
        description: Delete label
        call: public-labels.deletelabel
        with:
          labelKey: rest.labelKey
          labelValue: rest.labelValue
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: public-labels-mcp
    port: 9090
    transport: http
    description: MCP adapter for Segment Public API — Labels. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-labels
      description: List labels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: public-labels.listlabels
      outputParameters:
      - type: object
        mapping: $.
    - name: create-label
      description: Create label
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: public-labels.createlabel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-label
      description: Delete label
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: public-labels.deletelabel
      with:
        labelKey: tools.labelKey
        labelValue: tools.labelValue
      outputParameters:
      - type: object
        mapping: $.
