    url: json-ld/segment-context.jsonld
  - type: JSONSchema
    url: json-schema/segment-event-schema.json
  - type: JSONSchema
    url: json-schema/segment-source-schema.json
  - type: JSONSchema
    url: json-schema/segment-destination-schema.json
