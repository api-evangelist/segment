    description: Segment Config API HTTP API.
    authentication:
      type: bearer
      token: '{{SEGMENT_TOKEN}}'
    resources:
    - name: workspaces-workspacename
      path: /workspaces/{workspaceName}
      operations:
      - name: getworkspace
        method: GET
        description: Get workspace
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
