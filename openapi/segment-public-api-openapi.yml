components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Segment Public API access token. Generate tokens from the
        Segment workspace settings.
  parameters:
    PaginationCursor:
      name: pagination[cursor]
      in: query
      description: >-
        Cursor for pagination. Use the cursor returned in a previous
        response to fetch the next page.
      schema:
        type: string
    PaginationCount:
      name: pagination[count]
      in: query
      description: >-
        Number of items to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 10
    SourceId:
      name: sourceId
      in: path
      required: true
      description: >-
        The unique identifier of the source.
      schema:
        type: string
    DestinationId:
      name: destinationId
      in: path
      required: true
      description: >-
        The unique identifier of the destination.
      schema:
        type: string
    WarehouseId:
      name: warehouseId
      in: path
      required: true
      description: >-
        The unique identifier of the warehouse.
      schema:
        type: string
    TrackingPlanId:
      name: trackingPlanId
      in: path
      required: true
      description: >-
        The unique identifier of the tracking plan.
      schema:
        type: string
    FunctionId:
      name: functionId
      in: path
      required: true
      description: >-
        The unique identifier of the function.
      schema:
        type: string
    TransformationId:
      name: transformationId
      in: path
      required: true
      description: >-
        The unique identifier of the transformation.
      schema:
        type: string
  responses:
    BadRequest:
      description: >-
        The request was invalid or malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: >-
        Authentication credentials were missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: >-
        The authenticated user does not have permission to access
        this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: >-
        The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: >-
                  The error type.
              message:
                type: string
                description: >-
                  A human-readable error message.
              field:
                type: string
                description: >-
                  The field that caused the error, if applicable.
              data:
                type: object
                description: >-
                  Additional error data.
                additionalProperties: true
    Pagination:
      type: object
      properties:
        current:
          type: string
          description: >-
            Cursor pointing to the current page.
        next:
          type: string
          description: >-
            Cursor pointing to the next page. Null if no more pages.
        totalEntries:
          type: integer
          description: >-
            Total number of entries across all pages.
    Workspace:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the workspace.
        slug:
          type: string
          description: >-
            The URL-friendly slug of the workspace.
        name:
          type: string
          description: >-
            The display name of the workspace.
    Source:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the source.
        slug:
          type: string
          description: >-
            The URL-friendly slug of the source.
        name:
          type: string
          description: >-
            The display name of the source.
        enabled:
          type: boolean
          description: >-
            Whether the source is enabled.
        writeKeys:
          type: array
          items:
            type: string
          description: >-
            The write keys associated with the source.
        metadata:
          $ref: '#/components/schemas/CatalogSource'
        settings:
          type: object
          description: >-
            Configuration settings for the source.
          additionalProperties: true
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
          description: >-
            Labels applied to the source.
    Destination:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the destination.
        name:
          type: string
          description: >-
            The display name of the destination.
        enabled:
          type: boolean
          description: >-
            Whether the destination is enabled.
        sourceId:
          type: string
          description: >-
            The ID of the connected source.
        metadata:
          $ref: '#/components/schemas/CatalogDestination'
        settings:
          type: object
          description: >-
            Configuration settings for the destination.
          additionalProperties: true
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
          description: >-
            Labels applied to the destination.
    Warehouse:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the warehouse.
        enabled:
          type: boolean
          description: >-
            Whether the warehouse is enabled.
        metadata:
          type: object
          description: >-
            Metadata about the warehouse type.
          properties:
            id:
              type: string
              description: >-
                The metadata ID.
            name:
              type: string
              description: >-
                The name of the warehouse type.
            slug:
              type: string
              description: >-
                The slug of the warehouse type.
            description:
              type: string
              description: >-
                A description of the warehouse type.
        settings:
          type: object
          description: >-
            Configuration settings for the warehouse.
          additionalProperties: true
    TrackingPlan:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the tracking plan.
        name:
          type: string
          description: >-
            The name of the tracking plan.
        slug:
          type: string
          description: >-
            The URL-friendly slug of the tracking plan.
        description:
          type: string
          description: >-
            A description of the tracking plan.
        type:
          type: string
          description: >-
            The type of tracking plan.
          enum:
            - ENGAGE
            - LIVE
            - PROPERTY_LIBRARY
            - RULE_LIBRARY
            - TEMPLATE
        createdAt:
          type: string
          format: date-time
          description: >-
            When the tracking plan was created.
        updatedAt:
          type: string
          format: date-time
          description: >-
            When the tracking plan was last updated.
    TrackingPlanRule:
      type: object
      properties:
        type:
          type: string
          description: >-
            The type of event this rule applies to.
          enum:
            - COMMON
            - GROUP
            - IDENTIFY
            - PAGE
            - SCREEN
            - TRACK
        key:
          type: string
          description: >-
            The event name this rule matches, for track events.
        jsonSchema:
          type: object
          description: >-
            The JSON Schema that defines the expected properties.
          additionalProperties: true
        version:
          type: number
          description: >-
            The version of the rule.
    CatalogSource:
      type: object
      properties:
        id:
          type: string
          description: >-
            The metadata ID of the catalog source.
        name:
          type: string
          description: >-
            The name of the source integration.
        slug:
          type: string
          description: >-
            The URL-friendly slug.
        description:
          type: string
          description: >-
            A description of the source integration.
        logos:
          type: object
          description: >-
            Logo URLs for the integration.
          properties:
            default:
              type: string
              format: uri
              description: >-
                Default logo URL.
            alt:
              type: string
              format: uri
              description: >-
                Alternative logo URL.
            mark:
              type: string
              format: uri
              description: >-
                Mark logo URL.
        categories:
          type: array
          items:
            type: string
          description: >-
            Categories this source belongs to.
    CatalogDestination:
      type: object
      properties:
        id:
          type: string
          description: >-
            The metadata ID of the catalog destination.
        name:
          type: string
          description: >-
            The name of the destination integration.
        slug:
          type: string
          description: >-
            The URL-friendly slug.
        description:
          type: string
          description: >-
            A description of the destination integration.
        logos:
          type: object
          description: >-
            Logo URLs for the integration.
          properties:
            default:
              type: string
              format: uri
              description: >-
                Default logo URL.
            alt:
              type: string
              format: uri
              description: >-
                Alternative logo URL.
            mark:
              type: string
              format: uri
              description: >-
                Mark logo URL.
        categories:
          type: array
          items:
            type: string
          description: >-
            Categories this destination belongs to.
        supportedMethods:
          type: object
          description: >-
            Which Segment methods this destination supports.
          properties:
            track:
              type: boolean
              description: >-
                Whether track calls are supported.
            identify:
              type: boolean
              description: >-
                Whether identify calls are supported.
            page:
              type: boolean
              description: >-
                Whether page calls are supported.
            screen:
              type: boolean
              description: >-
                Whether screen calls are supported.
            group:
              type: boolean
              description: >-
                Whether group calls are supported.
            alias:
              type: boolean
              description: >-
                Whether alias calls are supported.
    Function:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the function.
        resourceType:
          type: string
          description: >-
            The type of resource this function applies to.
          enum:
            - DESTINATION
            - INSERT_DESTINATION
            - INSERT_SOURCE
            - SOURCE
        createdAt:
          type: string
          format: date-time
          description: >-
            When the function was created.
        createdBy:
          type: string
          description: >-
            The user who created the function.
        code:
          type: string
          description: >-
            The JavaScript code of the function.
        displayName:
          type: string
          description: >-
            The display name of the function.
        description:
          type: string
          description: >-
            A description of the function.
        logoUrl:
          type: string
          format: uri
          description: >-
            URL of the function logo.
        settings:
          type: array
          description: >-
            Settings definitions for the function.
          items:
            $ref: '#/components/schemas/FunctionSetting'
    FunctionSetting:
      type: object
      properties:
        name:
          type: string
          description: >-
            The name of the setting.
        label:
          type: string
          description: >-
            A human-readable label for the setting.
        description:
