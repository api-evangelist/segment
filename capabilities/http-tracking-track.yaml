naftiko: 1.0.0-alpha2
info:
  label: Segment HTTP Tracking API — Track
  description: 'Segment HTTP Tracking API — Track. 1 operations. Lead operation: Track an event. Self-contained Naftiko capability
    covering one Segment business surface.'
  tags:
  - Segment
  - Track
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEGMENT_API_KEY: SEGMENT_API_KEY
capability:
  consumes:
  - type: http
    namespace: http-tracking-track
    baseUri: https://api.segment.io/v1
    description: Segment HTTP Tracking API — Track business capability. Self-contained, no shared references.
    resources:
    - name: track
      path: /track
      operations:
      - name: track
        method: POST
        description: Track an event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.SEGMENT_USER}}'
      password: '{{env.SEGMENT_PASS}}'
  exposes:
  - type: rest
    namespace: http-tracking-track-rest
    port: 8080
    description: REST adapter for Segment HTTP Tracking API — Track. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/track
      name: track
      description: REST surface for track.
      operations:
      - method: POST
        name: track
        description: Track an event
        call: http-tracking-track.track
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: http-tracking-track-mcp
    port: 9090
    transport: http
    description: MCP adapter for Segment HTTP Tracking API — Track. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: track-event
      description: Track an event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: http-tracking-track.track
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
