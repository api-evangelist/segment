          type: string
          description: >-
            The type of regulation.
          enum:
            - DELETE_INTERNAL
            - DELETE_ONLY
            - SUPPRESS_AND_DELETE
            - SUPPRESS_ONLY
            - UNSUPPRESS
        subjectType:
          type: string
          description: >-
            The type of subject regulated.
          enum:
            - OBJECT_ID
            - USER_ID
