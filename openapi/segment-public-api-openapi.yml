        type:
          type: string
          description: >-
            The data type of the setting.
          enum:
            - BOOLEAN
            - STRING
            - TEXT_MAP
        required:
          type: boolean
          description: >-
            Whether this setting is required.
        sensitive:
          type: boolean
          description: >-
            Whether this setting contains sensitive data.
    Transformation:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the transformation.
        name:
          type: string
          description: >-
            The name of the transformation.
        sourceId:
          type: string
          description: >-
            The ID of the source this transformation applies to.
        destinationMetadataId:
          type: string
          description: >-
            The destination metadata ID if destination-scoped.
        enabled:
          type: boolean
          description: >-
            Whether the transformation is enabled.
        if:
          type: string
          description: >-
            The FQL condition that determines when the transformation runs.
        newEventName:
          type: string
          description: >-
            The new event name if renaming.
        propertyRenames:
          type: array
          description: >-
            Property renames applied by this transformation.
          items:
            type: object
            properties:
              oldName:
                type: string
                description: >-
                  The original property name.
              newName:
                type: string
                description: >-
                  The new property name.
        propertyValueTransformations:
          type: array
          description: >-
            Property value transformations applied.
          items:
            type: object
            properties:
              propertyPaths:
                type: array
                items:
                  type: string
                description: >-
                  The property paths to transform.
              propertyValue:
                type: string
                description: >-
                  The new value.
    Regulation:
      type: object
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the regulation request.
        workspaceId:
          type: string
          description: >-
            The workspace ID this regulation belongs to.
        overallStatus:
          type: string
          description: >-
            The overall status of the regulation request.
          enum:
            - FAILED
            - FINISHED
            - INITIALIZED
            - INVALID
            - NOT_SUPPORTED
            - PARTIAL_SUCCESS
            - RUNNING
