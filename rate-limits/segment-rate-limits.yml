specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Twilio Segment
providerId: segment
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - CDP
description: Segment Tracking and HTTP APIs enforce per-source rate limits.
sources:
  - https://www.twilio.com/en-us/pricing/customer-data
  - https://segment.com/docs/connections/sources/catalog/libraries/server/http-api/
headers: {}
responseCodes:
  throttled: 429
limits:
  - name: Tracking API
    scope: source
    metric: events_per_second
    limit: 30000
    timeFrame: second
    notes: Default; can be raised.
  - name: Public API
    scope: workspace
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: Functions invocations
    scope: function
    metric: concurrent
    limit: 100
  - name: Reverse ETL syncs
    scope: workspace
    metric: concurrent
    limit: 5
